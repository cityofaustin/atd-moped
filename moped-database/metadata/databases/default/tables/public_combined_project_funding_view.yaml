table:
  name: combined_project_funding_view
  schema: public
array_relationships:
  - name: ecapris_funding_files
    using:
      manual_configuration:
        column_mapping:
          original_id: entity_id
          project_id: project_id
        insertion_order: null
        remote_table:
          name: files_ecapris_funding
          schema: public
  - name: moped_funding_files
    using:
      manual_configuration:
        column_mapping:
          original_id: entity_id
        insertion_order: null
        remote_table:
          name: files_project_funding
          schema: public
select_permissions:
  - role: moped-admin
    permission:
      columns:
        - amount
        - created_at
        - description
        - ecapris_subproject_id
        - fao_id
        - fdu
        - funding_program_id
        - funding_source_id
        - funding_status_id
        - id
        - is_manual
        - is_synced_from_ecapris
        - original_id
        - program_name
        - project_id
        - should_use_ecapris_amount
        - source_name
        - status_name
        - unit_long_name
        - updated_at
      filter: {}
    comment: ""
  - role: moped-editor
    permission:
      columns:
        - amount
        - created_at
        - description
        - ecapris_subproject_id
        - fao_id
        - fdu
        - funding_program_id
        - funding_source_id
        - funding_status_id
        - id
        - is_manual
        - is_synced_from_ecapris
        - original_id
        - program_name
        - project_id
        - should_use_ecapris_amount
        - source_name
        - status_name
        - unit_long_name
        - updated_at
      filter: {}
    comment: ""
  - role: moped-viewer
    permission:
      columns:
        - amount
        - created_at
        - description
        - ecapris_subproject_id
        - fao_id
        - fdu
        - funding_program_id
        - funding_source_id
        - funding_status_id
        - id
        - is_manual
        - is_synced_from_ecapris
        - original_id
        - program_name
        - project_id
        - should_use_ecapris_amount
        - source_name
        - status_name
        - unit_long_name
        - updated_at
      filter: {}
    comment: ""
